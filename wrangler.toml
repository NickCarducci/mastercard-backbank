compatibility_date = "2021-10-18"
name = "mastercard-backbank-dev"
type = "javascript" # webpack
account_id = "9ddca7c9df604668fc6d14f079b2f066"
workers_dev = true
# webpack_config = "webpack.config.js"
[site]
bucket = "./dist"
entry-point = "workers-site"

[env.production]
exclude = ["node_modules","*"]
include = ["dist/index.js","src/index.js"]
name = "mastercard-backbank"

[env.staging]
name = "mastercard-backbank-staging"

[build]
# command = "browserify src/shim.mjs > dist/index.js"
command = "npx parcel build src/index.js"
# command = "npx rollup src/index.js --file dist/index.js --format es"
upload.format = "modules" # "service-workers"
upload.dir = "dist"
upload.main = "index.js"
[upload.rules]
type = "Text"
globs = ["**/*.txt"]
